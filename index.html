
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Emocional V3</title>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  transition: background 1s;
}

#circle {
  width:200px;
  height:200px;
  border-radius:50%;
  background:#6dd5ed;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:white;
  transition: all 2s ease;
}

button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

#moodLog {
  margin-top:20px;
  font-size:14px;
}
</style>
</head>

<body>

<div id="circle">Tocar</div>

<div>
  <button onclick="setMood('🙂 Bien')">🙂</button>
  <button onclick="setMood('😐 Normal')">😐</button>
  <button onclick="setMood('😔 Mal')">😔</button>
</div>

<div id="moodLog"></div>

<script>
let inhaling = true;

document.getElementById("circle").onclick = () => {
  const circle = document.getElementById("circle");

  if(inhaling){
    circle.style.transform = "scale(1.5)";
    circle.innerText = "Inhalar";
    document.body.style.background = "#89f7fe";
  } else {
    circle.style.transform = "scale(1)";
    circle.innerText = "Exhalar";
    document.body.style.background = "#66a6ff";
  }

  if (navigator.vibrate) navigator.vibrate(50);

  inhaling = !inhaling;
};

function setMood(mood){
  const time = new Date().toLocaleTimeString();
  const entry = `${time} - ${mood}`;

  let logs = JSON.parse(localStorage.getItem("moods")) || [];
  logs.push(entry);

  localStorage.setItem("moods", JSON.stringify(logs));
  renderMoods();
}

function renderMoods(){
  let logs = JSON.parse(localStorage.getItem("moods")) || [];
  document.getElementById("moodLog").innerHTML =
    "<b>Hoy:</b><br>" + logs.slice(-5).reverse().join("<br>");
}

renderMoods();
</script>

</body>
</html>
