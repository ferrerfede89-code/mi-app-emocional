<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>App Emocional V8</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #dff7f8, #72b7f5);
  min-height: 100vh;
  color: #1f2937;
  display: flex;
  justify-content: center;
  align-items: center;
}

.app {
  width: 92%;
  max-width: 390px;
  background: rgba(255,255,255,0.88);
  border-radius: 32px;
  padding: 26px;
  box-shadow: 0 20px 45px rgba(0,0,0,0.12);
}

.presence {
  text-align: center;
  font-size: 15px;
  color: #64748b;
  margin-bottom: 18px;
}

#circle {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  margin: 0 auto 18px;
  background: radial-gradient(circle, #8bdff2, #4b9fe1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 20px;
  transition: transform 2s ease, background 1s;
  box-shadow: 0 18px 35px rgba(75,159,225,0.35);
}

.message {
  text-align: center;
  font-size: 18px;
  margin-bottom: 24px;
  line-height: 1.4;
}

.section-title {
  font-weight: 700;
  margin-bottom: 12px;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.action {
  border: none;
  border-radius: 18px;
  background: #f1f5f9;
  padding: 14px 8px;
  font-size: 14px;
}

.action span {
  display: block;
  font-size: 24px;
  margin-bottom: 5px;
}

.moods {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 12px 0 22px;
}

.moods button {
  border: none;
  border-radius: 999px;
  padding: 10px 16px;
  font-size: 22px;
  background: #eef2f7;
}

.stats {
  background: #f8fafc;
  border-radius: 22px;
  padding: 18px;
}

.bar {
  height: 10px;
  border-radius: 20px;
  margin: 6px 0 14px;
}

.small {
  font-size: 14px;
  color: #64748b;
}

.fullscreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:9999;
  padding:30px;
  box-sizing:border-box;
  overflow:auto;
}

.softButton {
  border:none;
  border-radius:18px;
  padding:13px 16px;
  font-size:16px;
  background:white;
  margin:6px;
}

.textBox {
  width:100%;
  min-height:120px;
  border-radius:18px;
  padding:15px;
  font-size:16px;
  box-sizing:border-box;
  border:none;
}

.stayCircle {
  width: 165px;
  height: 165px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(147,197,253,0.65));
  box-shadow: 0 22px 60px rgba(59,130,246,0.25);
  margin-top: 42px;
  animation: stayPulse 8s infinite ease-in-out;
}

@keyframes stayPulse {
  0% { transform: scale(1); opacity: 0.82; }
  50% { transform: scale(1.16); opacity: 1; }
  100% { transform: scale(1); opacity: 0.82; }
}
</style>
</head>

<body>

<div class="app">
  <div class="presence">Estoy acá.</div>

  <div id="circle">Tocar</div>

  <div class="message" id="message">
    No hace falta resolver todo ahora.
  </div>

  <div class="section-title">¿Qué necesitás ahora?</div>

  <div class="actions">
    <button class="action" onclick="openBreathing()">
      <span>🫁</span>Respirar
    </button>
    <button class="action" onclick="openRelease()">
      <span>🔥</span>Liberar
    </button>
    <button class="action" onclick="openConnect()">
      <span>🫂</span>Conectar
    </button>
    <button class="action" onclick="openStay()">
      <span>🌊</span>Quedarme
    </button>
  </div>

  <div class="section-title">¿Cómo estás hoy?</div>

  <div class="moods">
    <button onclick="setMood('bien')">🙂</button>
    <button onclick="setMood('normal')">😐</button>
    <button onclick="setMood('mal')">😔</button>
  </div>

  <div class="stats" id="stats"></div>
</div>

<div id="breathingScreen" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,#dff7f8,#72b7f5);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
">
  <div id="breathingCircle" style="
  width:220px;
  height:220px;
  border-radius:50%;
  background:radial-gradient(circle,#8bdff2,#4b9fe1);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:28px;
  transition:all 4s ease;
  box-shadow:0 20px 40px rgba(0,0,0,.15);
  ">Inhalar</div>

  <div id="breathingMessage" style="margin-top:30px;font-size:22px;padding:20px;max-width:320px;">
    Respiremos juntos
  </div>

  <button onclick="closeBreathing()" class="softButton">Volver</button>
</div>

<div id="releaseScreen" class="fullscreen" style="background:linear-gradient(180deg,#fff7ed,#fdba74);">
  <h1>🔥</h1>
  <h2>¿Qué pesa ahora?</h2>

  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
    <button class="softButton" onclick="chooseTopic('Pensamientos')">Pensamientos</button>
    <button class="softButton" onclick="chooseTopic('Trabajo')">Trabajo</button>
    <button class="softButton" onclick="chooseTopic('Relación')">Relación</button>
    <button class="softButton" onclick="chooseTopic('Miedo')">Miedo</button>
    <button class="softButton" onclick="chooseTopic('Otra cosa')">Otra cosa</button>
  </div>

  <div id="selectedTopic" style="margin-bottom:15px;"></div>

  <textarea id="releaseText" class="textBox" placeholder="Podés dejarlo acá..."></textarea>

  <button onclick="releaseThought()" class="softButton" style="margin-top:20px;">Soltar</button>

  <div id="releaseResult" style="margin-top:30px;font-size:20px;font-weight:bold;"></div>

  <br><br>
  <button onclick="closeRelease()" class="softButton">Volver</button>
</div>

<div id="connectScreen" class="fullscreen" style="background:linear-gradient(180deg,#ede9fe,#bfdbfe);">
  <h1>🫂</h1>
  <h2>¿Quién te hace sentir seguro?</h2>

  <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px;">
    <button class="softButton" onclick="choosePerson('Mamá')">Mamá</button>
    <button class="softButton" onclick="choosePerson('Papá')">Papá</button>
    <button class="softButton" onclick="choosePerson('Hermano/a')">Hermano/a</button>
    <button class="softButton" onclick="choosePerson('Amigo/a')">Amigo/a</button>
    <button class="softButton" onclick="choosePerson('Pareja')">Pareja</button>
    <button class="softButton" onclick="choosePerson('Otra persona')">Otra persona</button>
  </div>

  <div id="selectedPerson" style="margin-bottom:18px;font-weight:bold;"></div>

  <h3>¿Qué necesitás hoy?</h3>

  <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
    <button class="softButton" onclick="chooseNeed('Quiero hablar')">Quiero hablar</button>
    <button class="softButton" onclick="chooseNeed('Quiero compañía')">Quiero compañía</button>
    <button class="softButton" onclick="chooseNeed('Solo quiero que sepa que hoy me cuesta')">Solo quiero que sepa que hoy me cuesta</button>
  </div>

  <div id="selectedNeed" style="margin-bottom:18px;"></div>

  <p style="font-size:17px;line-height:1.4;">
    Podés escribirlo. No hace falta enviarlo ahora.
  </p>

  <textarea id="connectText" class="textBox" placeholder="Hoy me cuesta un poco..."></textarea>

  <button onclick="prepareConnection()" class="softButton" style="margin-top:20px;">Preparar mensaje</button>

  <div id="connectResult" style="margin-top:25px;font-size:19px;font-weight:bold;"></div>

  <br><br>
  <button onclick="closeConnect()" class="softButton">Volver</button>
</div>

<div id="stayScreen" class="fullscreen" style="
background:linear-gradient(180deg,#dbeafe,#bfdbfe);
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
overflow:hidden;
">
  <div style="font-size:42px;margin-bottom:20px;">🌊</div>

  <div id="stayMessage" style="
  font-size:28px;
  font-weight:300;
  max-width:320px;
  line-height:1.5;
  ">
    Estoy acá.
  </div>

  <div class="stayCircle"></div>

  <div id="staySubMessage" style="
  margin-top:38px;
  max-width:310px;
  font-size:16px;
  color:#475569;
  line-height:1.5;
  ">
    No tenés que hacer nada.
  </div>

  <button onclick="closeStay()" class="softButton" style="margin-top:45px;">
    Volver
  </button>
</div>

<script>
let inhaling = true;
let breathingInterval;
let stayInterval;
let currentTopic = "";
let selectedPerson = "";
let selectedNeed = "";

const messages = [
  "No hace falta resolver todo ahora.",
  "Podemos quedarnos un momento.",
  "Respiremos primero.",
  "Esto que sentís también puede bajar.",
  "Un paso pequeño alcanza."
];

document.getElementById("circle").onclick = () => {
  const c = document.getElementById("circle");

  if (inhaling) {
    c.style.transform = "scale(1.35)";
    c.innerText = "Inhalar";
    document.body.style.background = "linear-gradient(180deg, #dff7f8, #72b7f5)";
  } else {
    c.style.transform = "scale(1)";
    c.innerText = "Exhalar";
    document.body.style.background = "linear-gradient(180deg, #e9e4ff, #8ec5fc)";
  }

  document.getElementById("message").innerText =
    messages[Math.floor(Math.random() * messages.length)];

  if (navigator.vibrate) navigator.vibrate(50);
  inhaling = !inhaling;
};

function setMood(mood) {
  let data = JSON.parse(localStorage.getItem("moods")) || {};
  let today = new Date().toISOString().split("T")[0];

  if (!data[today]) data[today] = [];
  data[today].push(mood);

  localStorage.setItem("moods", JSON.stringify(data));
  renderStats();
}

function renderStats() {
  let data = JSON.parse(localStorage.getItem("moods")) || {};
  let today = new Date().toISOString().split("T")[0];
  let moods = data[today] || [];

  let counts = { bien: 0, normal: 0, mal: 0 };
  moods.forEach(m => counts[m]++);

  let total = moods.length || 1;

  document.getElementById("stats").innerHTML = `
    <div class="section-title">Hoy</div>

    🙂 Bien (${counts.bien})
    <div class="bar" style="width:${counts.bien / total * 100}%; background:#4caf50;"></div>

    😐 Normal (${counts.normal})
    <div class="bar" style="width:${counts.normal / total * 100}%; background:#ff9800;"></div>

    😔 Mal (${counts.mal})
    <div class="bar" style="width:${counts.mal / total * 100}%; background:#f44336;"></div>

    <div class="small">Esto no mide tu valor. Solo registra cómo viene el día.</div>
  `;
}

function openBreathing() {
  document.getElementById("breathingScreen").style.display = "flex";

  const circle = document.getElementById("breathingCircle");
  const text = document.getElementById("breathingMessage");

  const breathingMessages = [
    "Estoy acá.",
    "No hace falta apurarse.",
    "Podemos quedarnos un momento.",
    "Un paso a la vez.",
    "Solamente respirá."
  ];

  let inhale = true;

  breathingInterval = setInterval(() => {
    if (inhale) {
      circle.style.transform = "scale(1.35)";
      circle.innerText = "Inhalar";
    } else {
      circle.style.transform = "scale(1)";
      circle.innerText = "Exhalar";
    }

    text.innerText =
      breathingMessages[Math.floor(Math.random() * breathingMessages.length)];

    inhale = !inhale;
  }, 4000);
}

function closeBreathing() {
  clearInterval(breathingInterval);
  document.getElementById("breathingScreen").style.display = "none";
}

function openRelease() {
  document.getElementById("releaseScreen").style.display = "block";
}

function closeRelease() {
  document.getElementById("releaseScreen").style.display = "none";
}

function chooseTopic(topic) {
  currentTopic = topic;
  document.getElementById("selectedTopic").innerText = "Elegiste: " + topic;
}

function releaseThought() {
  const text = document.getElementById("releaseText");
  text.value = "";

  document.getElementById("releaseResult").innerText =
    "Lo dejaste un poco afuera.";

  if (navigator.vibrate) {
    navigator.vibrate([100,50,100]);
  }
}

function openConnect() {
  document.getElementById("connectScreen").style.display = "block";
}

function closeConnect() {
  document.getElementById("connectScreen").style.display = "none";
}

function choosePerson(person) {
  selectedPerson = person;
  document.getElementById("selectedPerson").innerText =
    "Elegiste: " + person;
}

function chooseNeed(need) {
  selectedNeed = need;
  document.getElementById("selectedNeed").innerText =
    "Necesitás: " + need;
}

function prepareConnection() {
  const text = document.getElementById("connectText").value;

  let result = "No tenés que atravesarlo solo.";

  if (selectedPerson || selectedNeed || text.trim() !== "") {
    result = "Ya diste el primer paso: ponerlo en palabras.";
  }

  document.getElementById("connectResult").innerText = result;

  if (navigator.vibrate) {
    navigator.vibrate([80,40,80]);
  }
}

function openStay() {
  document.getElementById("stayScreen").style.display = "flex";

  const phrases = [
    "Estoy acá.",
    "No hace falta resolverlo ahora.",
    "Podemos quedarnos un momento.",
    "No tenés que hacer nada.",
    "Solo estar."
  ];

  const subPhrases = [
    "Podés quedarte un minuto.",
    "No hay nada que demostrar.",
    "Esto también puede ser suficiente.",
    "Respirá si podés. Si no, solo quedate.",
    "No estás obligado a sentirte mejor ahora."
  ];

  let index = 0;

  document.getElementById("stayMessage").innerText = phrases[0];
  document.getElementById("staySubMessage").innerText = subPhrases[0];

  stayInterval = setInterval(() => {
    index++;

    if (index >= phrases.length) {
      index = 0;
    }

    document.getElementById("stayMessage").innerText = phrases[index];
    document.getElementById("staySubMessage").innerText = subPhrases[index];
  }, 8000);

  if (navigator.vibrate) {
    navigator.vibrate(60);
  }
}

function closeStay() {
  clearInterval(stayInterval);
  document.getElementById("stayScreen").style.display = "none";
}

renderStats();
</script>

</body>
</html>
