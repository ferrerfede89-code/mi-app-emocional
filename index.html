
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Emocional V4</title>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(180deg, #89f7fe, #66a6ff);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#222;
}

.container {
  background:white;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:350px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

#circle {
  width:150px;
  height:150px;
  border-radius:50%;
  background:linear-gradient(135deg, #6dd5ed, #2193b0);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:20px auto;
  color:white;
  font-size:18px;
  transition: all 2s ease;
}

.buttons button {
  margin:5px;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:20px;
  background:#f0f0f0;
}

.buttons button:active {
  transform: scale(0.95);
}

#stats {
  margin-top:15px;
  text-align:left;
}

.bar {
  height:10px;
  margin:5px 0 10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>Respirar</h2>
<div id="circle">Tocar</div>

<div>
  <button onclick="setMood('bien')">🙂</button>
  <button onclick="setMood('normal')">😐</button>
  <button onclick="setMood('mal')">😔</button>
</div>

<div id="stats"></div>

<script>
let inhaling = true;

document.getElementById("circle").onclick = () => {
  const c = document.getElementById("circle");

  if(inhaling){
    c.style.transform = "scale(1.5)";
    c.innerText = "Inhalar";
    document.body.style.background = "#89f7fe";
  } else {
    c.style.transform = "scale(1)";
    c.innerText = "Exhalar";
    document.body.style.background = "#66a6ff";
  }

  if(navigator.vibrate) navigator.vibrate(50);
  inhaling = !inhaling;
};

function setMood(mood){
  let data = JSON.parse(localStorage.getItem("moods")) || {};
  let today = new Date().toISOString().split("T")[0];

  if(!data[today]) data[today] = [];
  data[today].push(mood);

  localStorage.setItem("moods", JSON.stringify(data));
  renderStats();
}

function renderStats(){
  let data = JSON.parse(localStorage.getItem("moods")) || {};
  let today = new Date().toISOString().split("T")[0];
  let moods = data[today] || [];

  let counts = {bien:0, normal:0, mal:0};

  moods.forEach(m => counts[m]++);

  let total = moods.length || 1;

  document.getElementById("stats").innerHTML = `
    <h3>Hoy</h3>
    🙂 Bien (${counts.bien})
    <div class="bar" style="width:${counts.bien/total*100}%; background:#4caf50;"></div>

    😐 Normal (${counts.normal})
    <div class="bar" style="width:${counts.normal/total*100}%; background:#ff9800;"></div>

    😔 Mal (${counts.mal})
    <div class="bar" style="width:${counts.mal/total*100}%; background:#f44336;"></div>
  `;
}

renderStats();
</script>

</body>
</html>
